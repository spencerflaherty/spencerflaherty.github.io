slug: websites
windowTitle: /Websites/
h1: WEBSITES

navigation:
  showInNavigation: true
  label: "Websites/"
  order: 7

seo:
  title: "Web Design & Development Portfolio | Spencer Flaherty"
  description: "Custom web projects on Squarespace, WordPress, and HubSpot. Terminal-style portfolio site, local business SEO builds, and agency redesigns that triple traffic."
  url: "https://spencerflaherty.com/websites"
  ogImage: "/static/images/collections/og/og-image.png"

prompt:
  cwd: websites
  command: ./display_projects

content:
  - type: section
    heading: "// Website Projects"
    projects:
      - title: "Splat"
        order: [description, media, buttonlink, stack]
        description: "Built a tool to create and view Gaussian splat 3D models locally with webcam head tracking — making it feel like you're actually inside the scene."
        media:
          - type: html
            html: "<iframe src='https://www.youtube-nocookie.com/embed/6GVVqWriwTs?si=8FbpsdTl9jvRTyBM&controls=0&rel=0&modestbranding=1' title='Splat Demo' allowfullscreen style='aspect-ratio: 9/16; max-width: 400px; margin: 0 auto;'></iframe>"
            width: "400px"
            align: center
        buttonlinks:
          - href: "https://splat.spencerflaherty.com/"
            text: "View Site"
        stack:
          - "WebGL, Three.js, Webcam APIs, Gaussian Splatting"
      - title: "Auto International"
        order: [media, description, buttonlink, stack]
        description: "Built an SEO-focused Squarespace site for an auto shop with no prior web presence — now ranking in local Google search."
        media:
          - type: image
            src: "/static/images/collections/websites/auto-international.png"
            alt: "Screenshot of the Auto International auto repair website homepage"
        buttonlinks:
          - href: "https://www.autointernationalrepair.com/"
            text: "View Site"
        stack:
          - "Squarespace"
      - title: "Annie Laukaitis"
        order: [media, description, buttonlink, stack]
        description: "Designed a content writer portfolio with custom animations and formatting to showcase writing samples — a clean link for her resume."
        media:
          - type: image
            src: "/static/images/collections/websites/annielauk.png"
            alt: "Screenshot of Annie Laukaitis portfolio website with a writing-focused layout"
        buttonlinks:
          - href: "https://www.annielauk.com/"
            text: "View Site"
        stack:
          - "Squarespace"
      - title: "Groove Commerce"
        order: [media, description, buttonlink, stack]
        description: "Led the redesign of my employer's site — handling design, copy, structure, and functionality — tripling organic traffic."
        media:
          - type: image
            src: "/static/images/collections/websites/groove-commerce.png"
            alt: "Screenshot of the Groove Commerce website redesign homepage"
        buttonlinks:
          - href: "https://www.groovecommerce.com/"
            text: "View Site"
        stack:
          - "HubSpot"
      - title: "Critical Peake"
        order: [media, description, buttonlink, stack]
        description: "Made regular improvements at my current employer — added a reviews carousel pulling from the automated review pipeline and improved site performance."
        media:
          - type: image
            src: "/static/images/collections/websites/critical-peake.png"
            alt: "Screenshot of the Critical Peake website featuring service pages and review content"
        buttonlinks:
          - href: "https://criticalpeake.com/"
            text: "View Site"
        stack:
          - "WordPress"

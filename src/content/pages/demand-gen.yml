slug: demand-gen
windowTitle: /Demand_Gen/
h1: DEMAND_GEN

navigation:
  label: "Demand_Gen/"
  order: 2

seo:
  title: "Demand Generation Portfolio | Spencer Flaherty"
  description: "Demand generation systems spanning outbound prospecting, paid acquisition, attribution, SEO content, and sales enablement."
  url: "https://spencerflaherty.com/demand-gen"
  ogImage: "/static/collections/shared/og-image.png"

prompt:
  cwd: demand-gen
  command: ./display_projects

content:
  - type: section
    heading: "// Outbound & Lead Capture"
    projects:
      - title: "Geospatial Prospecting"
        order: [media, description, stack]
        description: "Architected an end-to-end pipeline to identify high-value EV infrastructure leads by filtering physical land attributes, resolving ownership, and automating executive outreach."
        media:
          - type: image
            src: "/static/collections/shared/geospatial-prospecting.png"
            alt: "Geospatial Prospecting"
        stack:
          - "AI Logic: Agentic Workflows"
          - "Spatial Data: OpenStreetMap"
          - "Property Data: Public Land Records"
          - "B2B Intelligence: ZoomInfo"
          - "Execution Layer: Apollo"
      - title: "Gov-Procurement Pipeline"
        order: [media, description, stack]
        description: "Engineered a public-sector lead generation engine by scraping public procurement datasets, collecting agency persona contact info, and automating high-intent outbound sequences."
        media:
          - type: image
            src: "/static/collections/shared/gov-procurement-pipeline.png"
            alt: "Gov-Procurement Pipeline"
        stack:
          - "Ingestion Layer: Scraper Agent"
          - "Enrichment Layer: ZoomInfo"
          - "Execution Layer: AI Logic + Apollo.io"
      - title: "Arcadia Run Outreach Campaign"
        order: [media, description, stack]
        description: "Automated personalized outreach to peer properties by pulling CRM history for each contact, generating tailored emails referencing past interactions, and embedding case study links that scaled high-context outbound across the mid-Atlantic."
        media:
          - type: image
            src: "/static/collections/shared/arcadia-run-outreach-campaign.png"
            alt: "Arcadia Run Outreach Campaign"
        stack:
          - "Data Source: CRM Customer History"
          - "AI Logic: Dynamic Email Personalization"
          - "Content Asset: Video Case Study"
          - "Execution Layer: Automated Sequence Delivery"
      - title: "Intent Conversion Engine"
        order: [media, description, stack]
        description: "Built an inbound funnel that turns anonymous website traffic into qualified leads by identifying visitors through IP-to-company matching, layering in third-party intent signals, and auto-routing high-fit prospects to sales."
        media:
          - type: image
            src: "/static/collections/shared/intent-conversion-engine.png"
            alt: "Intent Conversion Engine"
        stack:
          - "Identity Resolution: Visitor De-anonymization (RB2B, Warmly, etc.)"
          - "Intent Layer: Bidstream + Co-op Data (Bombora, Demandbase)"
          - "Orchestration Layer: Zapier"
      - title: "Paid Acquisition Engine"
        order: [media, description, stack]
        description: "Designed a high speed-to-lead system by synchronizing Facebook and LinkedIn form submissions into CRM, routing validated leads via Zapier, and triggering instant rep notifications to maximize peak-intent conversion."
        media:
          - type: image
            src: "/static/collections/shared/paid-acquisition-engine.png"
            alt: "Paid Acquisition Engine"
        stack:
          - "Platforms: Facebook, LinkedIn"
          - "Orchestration Layer: Zapier"
          - "Notification Layer: Slack/Email/SMS"
          - "Pipeline Integration: CRM"

  - type: section
    heading: "// Paid Media & Sales Enablement"
    projects:
      - title: "Cooperative Purchasing Explainer"
        order: [media, description, stack]
        description: "Produced a video-driven campaign explaining how public agencies can bypass traditional RFPs and procure EV charging through Blue Whale's Sourcewell contract, turning a complex buying process into a clearer offer."
        media:
          - type: image
            src: "/static/collections/shared/cooperative-purchasing-explainer.png"
            alt: "Cooperative Purchasing Explainer"
        stack:
          - "AI Video: Kling 2.6 (start/end frame + motion control)"
          - "AI Image: Nano Banana"
          - "Script: Claude"
          - "Post-Production: DaVinci Resolve"
      - title: "Automated ROI Report Funnel"
        order: [description, media, stack]
        description: "Created a full-funnel campaign promoting a property-specific ROI report as a lead magnet. Ads and landing pages captured survey responses, then an MCP agent generated custom reports that strengthened the value proposition and improved quote-to-close rate."
        media:
          - type: linkedin
            src: "https://www.linkedin.com/embed/feed/update/urn:li:ugcPost:7423061288714555392?compact=1"
            title: "Automated ROI Report Funnel"
        stack:
          - "Ad Creative: DaVinci Resolve"
          - "Landing Page: Custom Design + Copy"
          - "Data Capture: Google Forms"
          - "Report Automation: Claude Skill + MCP Agent"
      - title: "$20 CPL Photo Campaign"
        order: [media, description, media, stack]
        description: "Achieved a $20 average CPL by shooting real technicians on real job sites, overlaying authentic Google reviews, and creating dozens of photo/copy variations that let Facebook's algorithm find the winners."
        media:
          - type: image
            src: "/static/collections/shared/20-cpl-photo-campaign.png"
            alt: "$20 CPL Photo Campaign"
          - type: image
            src: "/static/collections/shared/residential-fb-jamal.jpeg"
            alt: "Real Technician on Job Site"
        stack:
          - "Platform: Facebook Ads"
          - "Creative: Real Job Site Photography + Review Overlays"
          - "Variation Testing: Dozens of Photo/Review/Style Combinations"
          - "Targeting: Geo-Fenced Service Areas"
          - "Optimization: Conversions API + Maximize Conversions"
      - title: "B2B Retainer Acquisition"
        order: [description, media, stack]
        description: "Designed and ran LinkedIn ad campaigns that converted eCommerce brands into retainer clients for a Baltimore-based digital agency, including marquee accounts like Dippin' Dots."
        media:
          - type: image
            src: "/static/collections/shared/bigcommerce-linkedin-ad.png"
            alt: "B2B Retainer Acquisition LinkedIn Ad"
        stack:
          - "Platform: LinkedIn Ads"
          - "Design: Adobe Photoshop + Illustrator"
          - "Outcome: Retainer Client Acquisition"

  - type: section
    heading: "// Attribution, Reporting & Content"
    projects:
      - title: "Custom Attribution System"
        order: [media, description, stack]
        description: "Built a multi-touch attribution model connecting lead sources, sales activity, and online behavior to revenue, enabling smarter ad spend and clearer rep accountability."
        media:
          - type: image
            src: "/static/collections/shared/custom-attribution-system.png"
            alt: "Custom Attribution System"
        stack:
          - "BI Layer: Microsoft Power BI"
          - "Custom Tooling: Vibe-Coded Dashboard"
          - "Data Sources: CRM, Ad Platforms, Web Analytics"
      - title: "Pipeline & Churn Dashboards"
        order: [media, description, stack]
        description: "Built Power BI dashboards with automated alerts for pipeline health, churn risk, and sales activity, delivering insights via email, Slack, and in-app notifications."
        media:
          - type: image
            src: "/static/collections/shared/pipeline-churn-dashboards.png"
            alt: "Pipeline & Churn Dashboards"
        stack:
          - "BI Layer: Microsoft Power BI"
          - "Notifications: Email, Slack, In-Dashboard"
          - "Data Joins: CRM + Sales Activity + Job History"
      - title: "Automated Review Request Pipeline"
        order: [media, description, stack]
        description: "Pulled recent customers from CRM, filtered out existing reviewers, and sent AI-varied email requests for Google reviews, increasing both review volume and average rating."
        media:
          - type: image
            src: "/static/collections/shared/automated-review-request-pipeline.png"
            alt: "Automated Review Request Pipeline"
        stack:
          - "Data Source: SimPro (CRM) + Power BI"
          - "Email: iContact"
          - "AI Layer: Claude (RAG personalization)"
      - title: "Gated Lead Magnets"
        order: [description, stack]
        description: "Wrote and published lead-gen eBooks that captured intent signals for instant sales routing while building organic search authority. The PDFs were made crawlable and are now cited in ChatGPT and Gemini responses."
        stack:
          - "Writing: Google Docs"
          - "Design: Adobe InDesign"
          - "Distribution: Organic + Paid (Crawlable PDFs)"
      - title: "Groove Commerce Content Engine"
        order: [description, stack]
        description: "Managed production of hundreds of keyword-focused blog articles per year using writers, AI tools, and editorial systems, driving 300%+ growth in organic traffic."
        stack:
          - "Production: Third-Party Writers + AI Tools"
          - "Management: Editorial Calendar + CMS"
      - title: "Blue Whale EV Content Strategy"
        order: [description, stack]
        description: "Built a video-forward content strategy tied to real client work and social proof, using case studies and educational content to support both organic discovery and sales conversations."
        stack:
          - "Format: Written + Video Case Studies"
          - "Approach: Quality Over Quantity"
          - "Differentiator: Real Work, Real Proof"

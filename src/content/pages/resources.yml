        order: [description, stack]
        description: "Identified repetitive tasks and built small agentic workflows to handle them such as proposals, ROI calculators, incentive lookups. This frees the team to focus on creative, high-value work."
        stack:
          - "AI Layer: Claude + MCP"
          - "Orchestration: Zapier"

  - type: section
    heading: "// Whitepapers & eBooks"
    projects:
      - title: "Gated Lead Magnets"
        order: [description, stack]
        description: "Wrote and published lead-gen eBooks to capturing intent signals for instant sales routing while building organic search authority. Made PDFs crawlable, now cited in ChatGPT and Gemini responses."
        stack:
          - "Writing: Google Docs"
          - "Design: Adobe InDesign"
          - "Distribution: Organic + Paid (Crawlable PDFs)"

  - type: section
    heading: "// Blogs (SEO & GEO)"
    projects:
      - title: "Groove Commerce"
        order: [description, stack]
        description: "Managed production of hundreds of keyword-focused blog articles per year using writers, AI tools, and editorial systems. Drove 300%+ increase in organic traffic."

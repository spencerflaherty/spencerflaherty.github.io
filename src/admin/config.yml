backend:
  name: github
  repo: spencerflaherty/spencerflaherty.github.io
  branch: main
  # Sveltia uses PKCE, no OAuth proxy required; register a GitHub OAuth app
  # and put its Client ID here (PKCE flow only needs Client ID, not secret).
  # site_domain: www.spencerflaherty.com
  # auth_endpoint: https://auth.sveltia.app/auth

# Sveltia supports local editing via the File System Access API — click
# "Work with Local Repository" on the login screen and pick this repo folder.

media_folder: "src/static/images"
public_folder: "/static/images"

# Per-file collections — each YAML is its own editable "file".
# Shared content item schemas are duplicated per collection because Sveltia
# (like Decap) does not support YAML anchors in config.yml.

collections:

  - name: site-settings
    label: "Site Settings"
    editor: { preview: false }
    files:
      - file: "src/_data/site.yml"
        name: site
        label: "Site-wide settings"
        fields:
          - { label: "Base URL", name: url, widget: string, hint: "Full origin, e.g. https://www.spencerflaherty.com" }
          - label: "Layout & spacing"
            name: layout
            widget: object
            fields:
              - { label: "Logo link URL", name: logoLinkUrl, widget: string, hint: "Where clicking the logo takes you. Usually the home URL." }
              - { label: "Padding above logo", name: paddingAboveLogo, widget: string, hint: "CSS value, e.g. 30px or 2rem" }
              - { label: "Padding below logo (gap between logo and terminal)", name: paddingBelowLogo, widget: string }
              - { label: "Padding below terminal window", name: paddingBelowWindow, widget: string }
              - { label: "Terminal window width — desktop", name: windowWidthDesktop, widget: string, hint: "e.g. 800px or 90%. Applied above 600px viewport." }
              - { label: "Terminal window width — mobile", name: windowWidthMobile, widget: string, hint: "e.g. 100% or 360px. Applied at 600px viewport or below." }
              - label: "Terminal content spacing"
                name: spacing
                widget: object
                hint: "Vertical margins for H1 / H2 / dropdown rows inside the terminal"
                fields:
                  - { label: "H1 margin top (e.g. RESOURCES heading)", name: h1MarginTop, widget: string }
                  - { label: "H1 margin bottom", name: h1MarginBottom, widget: string }
                  - { label: "H2 margin top (e.g. // Internal Training...)", name: h2MarginTop, widget: string }
                  - { label: "H2 margin bottom", name: h2MarginBottom, widget: string }
                  - { label: "Dropdown margin bottom (e.g. [+] Project rows)", name: dropdownMarginBottom, widget: string }

  - name: home
    label: "Home page"
    editor: { preview: false }
    files:
      - file: "src/content/pages/home.yml"
        name: home
        label: "Home"
        fields:
          - { label: "Slug", name: slug, widget: hidden, default: home }
          - { label: "Window Title", name: windowTitle, widget: string }
          - label: "SEO"
            name: seo
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: "Canonical URL", name: url, widget: string, required: false }
              - { label: "OG Image", name: ogImage, widget: image, required: false }
          - label: "Prompt line"
            name: prompt
            widget: object
            fields:
              - { label: "Working directory", name: cwd, widget: string, required: false }
              - { label: "Command", name: command, widget: string }
          - label: "Hero image"
            name: content
            widget: list
            types:
              - name: image
                label: "Image"
                fields:
                  - { label: Type, name: type, widget: hidden, default: image }
                  - { label: Source, name: src, widget: image }
                  - { label: Alt, name: alt, widget: string, required: false }

  - name: about
    label: "About page"
    editor: { preview: false }
    files:
      - file: "src/content/pages/about.yml"

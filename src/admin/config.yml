              - { label: "OG Image", name: ogImage, widget: image, required: false }
          - label: "Prompt line"
            name: prompt
            widget: object
            fields:
              - { label: "Working directory", name: cwd, widget: string, required: false }
              - { label: "Command", name: command, widget: string }
          - label: "Content"
            name: content
            widget: list
            types:
              - name: text
                label: "Text"
                fields:
                  - { label: Type, name: type, widget: hidden, default: text }
                  - { label: Text, name: text, widget: text }
              - name: image
                label: "Image"
                fields:
                  - { label: Type, name: type, widget: hidden, default: image }
                  - { label: Source, name: src, widget: image }
                  - { label: Alt, name: alt, widget: string, required: false }
                  - { label: "Size variant", name: variant, widget: select, options: ["", sm, md, lg], required: false }
              - name: buttonlink
                label: "Button link"
                fields:
                  - { label: Type, name: type, widget: hidden, default: buttonlink }
                  - { label: URL, name: href, widget: string }
                  - { label: Text, name: text, widget: string }
              - name: linebreak
                label: "Line break"
                fields:
                  - { label: Type, name: type, widget: hidden, default: linebreak }


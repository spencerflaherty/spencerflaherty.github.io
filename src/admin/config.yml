backend:
  name: github
  repo: spencerflaherty/spencerflaherty.github.io
  branch: main
  # GitHub PKCE is not available in Sveltia CMS yet.
  # For remote sign-in on GitHub Pages, either:
  # 1) use the "Sign In with Token" flow, or
  # 2) deploy an OAuth client (for example Sveltia CMS Authenticator)
  #    and set its URL as `base_url` below.
  # base_url: https://your-auth-worker.workers.dev

# Sveltia supports local editing via the File System Access API.
# Click "Work with Local Repository" on the login screen and pick this repo folder.

media_folder: "src/static"
public_folder: "/static"

collections:
  - name: site-settings
    label: "Site Settings"
    editor: { preview: false }
    files:
      - file: "src/_data/site.yml"
        name: site
        label: "Site-wide settings"
        fields:
          - { label: "Base URL", name: url, widget: string, hint: "Full origin, e.g. https://spencerflaherty.com" }
          - label: "Branding"
            name: branding
            widget: object
            fields:
              - { label: "Home link aria label", name: homeAriaLabel, widget: string, required: false }
              - { label: "Logo alt text", name: logoAlt, widget: string }
              - { label: "Desktop logo image", name: logoDesktopSrc, widget: image }
              - { label: "Desktop logo width", name: logoDesktopWidth, widget: number, value_type: int, min: 1 }
              - { label: "Desktop logo height", name: logoDesktopHeight, widget: number, value_type: int, min: 1 }
              - { label: "Mobile logo image", name: logoMobileSrc, widget: image }
              - { label: "Mobile logo width", name: logoMobileWidth, widget: number, value_type: int, min: 1 }
              - { label: "Mobile logo height", name: logoMobileHeight, widget: number, value_type: int, min: 1 }
          - label: "Terminal behavior"
            name: terminal
            widget: object
            fields:
              - { label: "Prompt host label", name: host, widget: string, hint: "Example: root@spencer-portfolio" }
              - { label: "Prompt root path", name: rootPath, widget: string, hint: "Example: ~" }
              - { label: "Navigation command", name: navigationCommand, widget: string, hint: "Command shown before the menu is printed" }
              - { label: "Navigation prompt", name: navigationPrompt, widget: string, hint: "Text before the [0-x] range, e.g. Enter module ID" }
              - { label: "Typing speed", name: typeSpeed, widget: number, value_type: int, min: 1, hint: "Lower is faster" }
              - { label: "Initial load delay (ms)", name: initialDelayMs, widget: number, value_type: int, min: 0 }
          - label: "Layout & spacing"
            name: layout
            widget: object
            fields:
              - { label: "Logo link URL", name: logoLinkUrl, widget: string, hint: "Where clicking the logo takes you. Usually the home URL." }
              - { label: "Padding above logo", name: paddingAboveLogo, widget: string, hint: "CSS value, e.g. 30px or 2rem" }
              - { label: "Padding below logo", name: paddingBelowLogo, widget: string, hint: "Gap between the logo and terminal window" }
              - { label: "Padding below terminal window", name: paddingBelowWindow, widget: string }
              - { label: "Terminal window width, desktop", name: windowWidthDesktop, widget: string, hint: "e.g. 800px or 90%" }
              - { label: "Terminal window width, mobile", name: windowWidthMobile, widget: string, hint: "e.g. 100% or 360px" }
              - label: "Terminal content spacing"
                name: spacing
                widget: object
                fields:
                  - { label: "H1 margin top", name: h1MarginTop, widget: string }
                  - { label: "H1 margin bottom", name: h1MarginBottom, widget: string }
                  - { label: "H2 margin top", name: h2MarginTop, widget: string }
                  - { label: "H2 margin bottom", name: h2MarginBottom, widget: string }
                  - { label: "Dropdown margin bottom", name: dropdownMarginBottom, widget: string }

  - name: home
    label: "Home Page"
    editor: { preview: false }
    files:
      - file: "src/content/pages/home.yml"
        name: home
        label: "Home"
        media_folder: "src/static/collections/shared"
        public_folder: "/static/collections/shared"
        fields:
          - { label: "Slug", name: slug, widget: hidden, default: home }
          - { label: "Window title", name: windowTitle, widget: string }
          - label: "Navigation"
            name: navigation
            widget: object
            fields:
              - { label: "Show in navigation", name: showInNavigation, widget: boolean, default: true, required: false }
              - { label: "Menu label", name: label, widget: string, hint: "Example: ~Root/ (Home)" }
              - { label: "Menu order", name: order, widget: number, value_type: int, min: 0 }
          - label: "SEO"
            name: seo
            widget: object
            fields:
              - { label: "Title", name: title, widget: string }
              - { label: "Description", name: description, widget: text }
              - { label: "Canonical URL", name: url, widget: string, required: false }
              - { label: "OG image", name: ogImage, widget: image, required: false }
              - { label: "OG title override", name: ogTitle, widget: string, required: false }
              - { label: "OG description override", name: ogDescription, widget: text, required: false }
              - { label: "Twitter title override", name: twitterTitle, widget: string, required: false }
              - { label: "Twitter description override", name: twitterDescription, widget: text, required: false }
              - { label: "Twitter image override", name: twitterImage, widget: image, required: false }
          - label: "Prompt line"
            name: prompt
            widget: object
            fields:
              - { label: "Working directory", name: cwd, widget: string, required: false }
              - { label: "Command", name: command, widget: string }
          - label: "Hero / intro blocks (optional)"
            name: content
            widget: list
            required: false
            types:
              - name: text
                label: "Text"
                fields:
                  - { label: "Type", name: type, widget: hidden, default: text }
                  - { label: "Text", name: text, widget: text }
              - name: image
                label: "Image"
                fields:
                  - { label: "Type", name: type, widget: hidden, default: image }
                  - { label: "Image", name: src, widget: image }
                  - { label: "Alt text", name: alt, widget: string, required: false }
                  - { label: "Caption", name: caption, widget: text, required: false }
                  - { label: "Width", name: width, widget: string, required: false, hint: "Exact CSS width, e.g. 680px, 60vw, 100%" }
                  - { label: "Max width", name: maxWidth, widget: string, required: false, hint: "Optional clamp, e.g. 100%" }
                  - { label: "Height", name: height, widget: string, required: false, hint: "Exact CSS height, e.g. 420px" }
                  - { label: "Max height", name: maxHeight, widget: string, required: false }
                  - { label: "Alignment", name: align, widget: select, options: [left, center, right, full], required: false }
                  - { label: "Size variant", name: variant, widget: select, options: ["", sm, md, lg], required: false }
                  - { label: "Object fit", name: objectFit, widget: select, options: ["", contain, cover, fill, none, scale-down], required: false }
                  - { label: "Link URL", name: linkUrl, widget: string, required: false }
                  - { label: "Open link in new tab", name: openInNewTab, widget: boolean, default: true, required: false }
                  - { label: "Spacing top", name: spacingTop, widget: string, required: false }
                  - { label: "Spacing bottom", name: spacingBottom, widget: string, required: false }
              - name: youtube
                label: "YouTube"
                fields:
                  - { label: "Type", name: type, widget: hidden, default: youtube }
                  - { label: "Video ID", name: videoId, widget: string }
                  - { label: "Title", name: title, widget: string, required: false }
                  - { label: "Caption", name: caption, widget: text, required: false }
                  - { label: "Width", name: width, widget: string, required: false }
                  - { label: "Max width", name: maxWidth, widget: string, required: false }
                  - { label: "Height", name: height, widget: string, required: false }
                  - { label: "Max height", name: maxHeight, widget: string, required: false }
                  - { label: "Aspect ratio", name: aspectRatio, widget: string, required: false, hint: "Used when height is blank. Example: 16 / 9" }
                  - { label: "Alignment", name: align, widget: select, options: [left, center, right, full], required: false }
                  - { label: "Spacing top", name: spacingTop, widget: string, required: false }
                  - { label: "Spacing bottom", name: spacingBottom, widget: string, required: false }
              - name: vimeo
                label: "Vimeo"
                fields:
                  - { label: "Type", name: type, widget: hidden, default: vimeo }
                  - { label: "Embed URL", name: src, widget: string }
                  - { label: "Title", name: title, widget: string, required: false }
                  - { label: "Caption", name: caption, widget: text, required: false }
                  - { label: "Width", name: width, widget: string, required: false }
                  - { label: "Max width", name: maxWidth, widget: string, required: false }
                  - { label: "Height", name: height, widget: string, required: false }
                  - { label: "Max height", name: maxHeight, widget: string, required: false }
                  - { label: "Aspect ratio", name: aspectRatio, widget: string, required: false }
                  - { label: "Alignment", name: align, widget: select, options: [left, center, right, full], required: false }
                  - { label: "Spacing top", name: spacingTop, widget: string, required: false }
                  - { label: "Spacing bottom", name: spacingBottom, widget: string, required: false }
              - name: linkedin
                label: "LinkedIn"
                fields:
                  - { label: "Type", name: type, widget: hidden, default: linkedin }
                  - { label: "Embed URL", name: src, widget: string }
                  - { label: "Title", name: title, widget: string, required: false }
                  - { label: "Caption", name: caption, widget: text, required: false }
                  - { label: "Width", name: width, widget: string, required: false }
                  - { label: "Max width", name: maxWidth, widget: string, required: false }
                  - { label: "Height", name: height, widget: string, required: false }
                  - { label: "Max height", name: maxHeight, widget: string, required: false }
                  - { label: "Aspect ratio", name: aspectRatio, widget: string, required: false, hint: "Used when height is blank. Example: 4 / 5" }
                  - { label: "Alignment", name: align, widget: select, options: [left, center, right, full], required: false }
                  - { label: "Spacing top", name: spacingTop, widget: string, required: false }
                  - { label: "Spacing bottom", name: spacingBottom, widget: string, required: false }
              - name: html
                label: "Custom HTML"
                fields:
                  - { label: "Type", name: type, widget: hidden, default: html }
                  - { label: "HTML", name: html, widget: text }
                  - { label: "Caption", name: caption, widget: text, required: false }
                  - { label: "Width", name: width, widget: string, required: false }
                  - { label: "Max width", name: maxWidth, widget: string, required: false }
                  - { label: "Height", name: height, widget: string, required: false }
                  - { label: "Max height", name: maxHeight, widget: string, required: false }
                  - { label: "Aspect ratio", name: aspectRatio, widget: string, required: false }
                  - { label: "Alignment", name: align, widget: select, options: [left, center, right, full], required: false }
                  - { label: "Spacing top", name: spacingTop, widget: string, required: false }
                  - { label: "Spacing bottom", name: spacingBottom, widget: string, required: false }
